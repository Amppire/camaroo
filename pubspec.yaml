name: camaroo
description: A professional cross-platform camera application with DSLR-like functionality, photo editor, and AI-assisted features.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Camera functionality
  camera: ^0.10.5+5
  camera_platform_interface: ^2.7.0
  
  # Image processing and editing
  image: ^4.1.3
  image_picker: ^1.0.4
  photo_view: ^0.14.0
  
  # Photo editor
  flutter_colorpicker: ^1.0.3
  image_cropper: ^5.0.0
  
  # Gallery and file management
  photo_manager: ^3.0.0
  path_provider: ^2.1.1
  permission_handler: ^11.0.1
  
  # State management
  provider: ^6.1.1
  
  # AI and ML features
  google_ml_kit: ^0.16.3
  tflite_flutter: ^0.10.4
  
  # UI components
  cupertino_icons: ^1.0.6
  flutter_staggered_grid_view: ^0.7.0
  carousel_slider: ^4.2.1
  shimmer: ^3.0.0
  
  # Storage
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  
  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.1
  exif: ^3.3.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/filters/
    - assets/models/
